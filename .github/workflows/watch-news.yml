name: Watch reporter news

on:
  schedule:
    # GitHub schedule 은 지연·누락이 잦으므로 "재시작 트리거" 용도로만 둔다.
    # 실제 5분 cadence 는 아래 job 내부 self-loop 가 책임진다.
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read   # 단일 실행 가드가 다른 in_progress run 을 조회하는 데 필요

concurrency:
  # 한 번에 하나만 실행. 새 트리거는 pending 으로 대기하다가 현재 루프가 끝나면
  # 곧바로 이어받아(cancel-in-progress: false) 끊김 없이 다음 루프를 시작한다.
  group: news-reporter-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 320

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 단일 실행 가드: 나보다 먼저 시작된(=run id 가 작은) 같은 워크플로우 run 이
      # 아직 살아 있으면 즉시 종료한다. schedule 이 6시간 루프 도중 새 run 을 만들어
      # 두 루프가 겹쳐 같은 기사를 두 번 보내던 문제를 원천 차단한다.
      - name: Single-flight guard
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          others=$(gh run list --workflow watch-news.yml --status in_progress \
            --json databaseId --jq '.[].databaseId' | grep -v "^${GITHUB_RUN_ID}$" || true)
          for id in $others; do
            if [ "$id" -lt "$GITHUB_RUN_ID" ]; then
              echo "이미 실행 중인 이전 run($id)이 있어 이 run 은 종료합니다(겹침 방지)."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "skip=0" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.guard.outputs.skip == '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.skip == '0'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Watch loop (5-min cadence)
        if: steps.guard.outputs.skip == '0'
        env:
          NAVER_CLIENT_ID:           ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:       ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID:             ${{ secrets.LINE_GROUP_ID }}
          REPORTERS:                 ${{ secrets.REPORTERS }}
          DISPATCH_PAT:              ${{ secrets.DISPATCH_PAT }}
        run: |
          set +e
          git config user.name  "news-watcher-bot"
          git config user.email "actions@github.com"

          INTERVAL=300          # 5분
          END=$(( SECONDS + 18000 ))   # 5시간 반복 후 종료(timeout 320분보다 여유; 다음 트리거가 이어받음)
          iter=0

          while [ "$SECONDS" -lt "$END" ]; do
            iter=$(( iter + 1 ))
            echo "::group::iteration $iter (elapsed ${SECONDS}s)"
            # 전송 판단 전에 최신 발송 이력을 받아온다(run 교대/경합 시 재전송 방지).
            git pull --rebase --autostash origin main || git reset --hard origin/main
            python watcher.py
            echo "::endgroup::"

            # 전송 이력 저장(중복 발송 방지의 핵심). 변경 있으면 재시도하며 push.
            git add data/sent_articles.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update sent article history [skip ci]"
              for i in 1 2 3 4 5; do
                git pull --rebase --autostash && git push && break
                echo "push 재시도 $i ..."
                sleep 3
              done
            fi

            # 마지막 회차면 굳이 더 자지 않고 종료(다음 트리거가 이어받음).
            [ "$SECONDS" -ge "$END" ] && break
            sleep "$INTERVAL"
          done

          echo "loop finished after $iter iterations (elapsed ${SECONDS}s)"

          # 다음 루프를 즉시 이어서 시작(공백 제거). GITHUB_TOKEN 은 새 워크플로우를
          # 트리거하지 못하므로, Actions write 권한의 PAT(DISPATCH_PAT)로 self-dispatch.
          # 동시성 그룹이 pending 으로 받아 이 실행 종료 직후 곧바로 다음 루프를 시작한다.
          if [ -n "$DISPATCH_PAT" ]; then
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $DISPATCH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/watch-news.yml/dispatches" \
              -d '{"ref":"main"}')
            echo "self-dispatch HTTP $code (204 면 성공)"
          else
            echo "DISPATCH_PAT 미설정 — schedule 에 의존(최대 수시간 공백 가능). README 11장 참고."
          fi
