name: Watch reporter news

on:
  schedule:
    # 매시 2,7,12,...,57분에 실행 (정각 부하 회피)
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-reporter-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run watcher
        env:
          NAVER_CLIENT_ID:           ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:       ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID:             ${{ secrets.LINE_GROUP_ID }}
          REPORTERS:                 ${{ secrets.REPORTERS }}
        run: python watcher.py

      - name: Commit sent article history
        run: |
          git config user.name  "news-watcher-bot"
          git config user.email "actions@github.com"
          git add data/sent_articles.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update sent article history [skip ci]"
            # 상태(전송 이력)는 반드시 저장돼야 중복 발송을 막는다. 경합 시 재시도.
            pushed=0
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash && git push && { pushed=1; break; }
              echo "push 재시도 $i ..."
              sleep 3
            done
            if [ "$pushed" -ne 1 ]; then
              echo "::error::전송 이력 push 실패 — 다음 실행에서 중복 발송 위험"
              exit 1
            fi
          fi
