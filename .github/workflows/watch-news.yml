name: Watch reporter news

on:
  schedule:
    # GitHub schedule 은 지연·누락이 잦으므로 "재시작 트리거" 용도로만 둔다.
    # 실제 5분 cadence 는 아래 job 내부 self-loop 가 책임진다.
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # 한 번에 하나만 실행. 새 트리거는 pending 으로 대기하다가 현재 루프가 끝나면
  # 곧바로 이어받아(cancel-in-progress: false) 끊김 없이 다음 루프를 시작한다.
  group: news-reporter-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # GitHub job 최대치(6시간)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Watch loop (5-min cadence)
        env:
          NAVER_CLIENT_ID:           ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:       ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID:             ${{ secrets.LINE_GROUP_ID }}
          REPORTERS:                 ${{ secrets.REPORTERS }}
        run: |
          set +e
          git config user.name  "news-watcher-bot"
          git config user.email "actions@github.com"

          INTERVAL=300          # 5분
          END=$(( SECONDS + 21000 ))   # 약 5시간 50분 동안 반복 후 종료(다음 트리거가 이어받음)
          iter=0

          while [ "$SECONDS" -lt "$END" ]; do
            iter=$(( iter + 1 ))
            echo "::group::iteration $iter (elapsed ${SECONDS}s)"
            python watcher.py
            echo "::endgroup::"

            # 전송 이력 저장(중복 발송 방지의 핵심). 변경 있으면 재시도하며 push.
            git add data/sent_articles.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update sent article history [skip ci]"
              for i in 1 2 3 4 5; do
                git pull --rebase --autostash && git push && break
                echo "push 재시도 $i ..."
                sleep 3
              done
            fi

            # 마지막 회차면 굳이 더 자지 않고 종료(다음 트리거가 이어받음).
            [ "$SECONDS" -ge "$END" ] && break
            sleep "$INTERVAL"
          done

          echo "loop finished after $iter iterations (elapsed ${SECONDS}s)"
